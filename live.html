<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Learnova — Session Live</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#fff;--bg2:#f7f8fc;--border:#e4e5f0;
  --text:#09090f;--text2:#454560;--text3:#9090b0;
  --accent:#1a56db;--al:#eff3ff;--am:#c7d7fd;
  --green:#047857;--gl:#ecfdf5;--gm:#a7f3d0;
  --red:#b91c1c;--rl:#fef2f2;
  --purple:#6d28d9;--pl:#f5f3ff;
  --h:'Instrument Serif',serif;--b:'DM Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg2);color:var(--text);font-family:var(--b);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}

.nav{height:52px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.lm{width:26px;height:26px;border-radius:7px;background:var(--text);display:flex;align-items:center;justify-content:center;}
.lm svg{width:13px;height:13px;}
.ln{font-family:var(--h);font-size:1rem;color:var(--text);}
.live-pill{display:flex;align-items:center;gap:5px;background:var(--rl);color:var(--red);font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:100px;}
.pulse{width:5px;height:5px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite;display:inline-block;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.8);}}
.sname{font-family:var(--h);font-size:.92rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ltimer{font-family:var(--h);font-size:1rem;color:var(--accent);flex-shrink:0;}
.pcount-badge{font-size:.72rem;color:var(--text3);display:flex;align-items:center;gap:4px;flex-shrink:0;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-family:var(--b);font-weight:500;font-size:.8rem;cursor:pointer;border:none;transition:all .2s;text-decoration:none;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-ghost:hover{background:var(--bg2);}

.layout{flex:1;display:grid;grid-template-columns:1fr 310px;overflow:hidden;}

/* GAUCHE */
.left{display:flex;flex-direction:column;overflow:hidden;}

/* BARRE PARTICIPANTS */
.pbar{background:var(--bg);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:6px;flex-shrink:0;overflow-x:auto;min-height:52px;}
.pbar::-webkit-scrollbar{height:2px;}
.pchip{display:flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--border);border-radius:100px;padding:3px 10px 3px 4px;flex-shrink:0;animation:chipIn .3s ease;}
@keyframes chipIn{from{opacity:0;transform:scale(.8);}to{opacity:1;transform:scale(1);}}
.pchip-av{width:24px;height:24px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.6rem;font-weight:700;}
.pchip-av img{width:100%;height:100%;object-fit:cover;}
.pchip-name{font-size:.7rem;font-weight:500;color:var(--text2);}
.pbar-label{font-size:.7rem;color:var(--text3);white-space:nowrap;flex-shrink:0;}
.pmore{font-size:.7rem;color:var(--text3);flex-shrink:0;}

/* ZONE ENSEIGNEMENT */
.teach{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.teach::-webkit-scrollbar{width:4px;}
.teach::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* MESSAGE IA */
.ai-msg{display:flex;gap:10px;align-items:flex-start;}
.ai-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-family:var(--h);font-size:.8rem;color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(26,86,219,.3);}
.ai-body{flex:1;max-width:700px;}
.ai-label{font-size:.66rem;font-weight:700;color:var(--accent);margin-bottom:4px;display:flex;align-items:center;gap:5px;}
.ai-label span{background:var(--al);padding:1px 7px;border-radius:100px;font-size:.6rem;}
.ai-bubble{background:var(--bg);border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:13px 16px;font-size:.86rem;line-height:1.75;color:var(--text2);box-shadow:0 1px 4px rgba(0,0,0,.05);}
.ai-bubble strong{color:var(--text);}
.ai-bubble code{background:var(--bg2);padding:2px 6px;border-radius:4px;font-family:'Courier New',monospace;font-size:.8em;color:var(--accent);}
.ai-bubble em{color:var(--purple);font-style:normal;font-weight:500;}

/* MESSAGE UTILISATEUR */
.user-msg{display:flex;gap:8px;align-items:flex-start;flex-direction:row-reverse;}
.user-av{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.68rem;font-weight:700;}
.user-av img{width:100%;height:100%;object-fit:cover;}
.user-bubble{background:var(--al);border:1px solid var(--am);border-radius:14px 4px 14px 14px;padding:10px 14px;font-size:.84rem;line-height:1.6;color:var(--text2);max-width:70%;}

/* NOTE PUBLIQUE */
.note-msg{background:var(--gl);border:1px solid var(--gm);border-radius:12px;padding:12px 14px;}
.note-head{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.note-av{width:22px;height:22px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.6rem;font-weight:700;}
.note-av img{width:100%;height:100%;object-fit:cover;}
.note-name{font-size:.74rem;font-weight:600;}
.note-time{font-size:.67rem;color:var(--text3);margin-left:auto;}
.note-text{font-size:.82rem;color:var(--text2);line-height:1.6;}

/* TYPING */
.typing-msg{display:flex;gap:10px;align-items:center;}
.typing-dots{display:flex;gap:4px;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:4px 14px 14px 14px;}
.typing-dots span{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:dotBounce 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dotBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

/* CHALLENGE */
.challenge-box{background:var(--bg);border:2px solid var(--accent);border-radius:14px;padding:18px;margin:0 14px 12px;display:none;animation:slideUp .35s ease;}
.challenge-box.show{display:block;}
@keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.ch-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.ch-icon{width:32px;height:32px;border-radius:8px;background:var(--al);display:flex;align-items:center;justify-content:center;}
.ch-icon svg{width:15px;height:15px;color:var(--accent);}
.ch-title{font-weight:600;font-size:.88rem;flex:1;}
.ch-timer{font-family:var(--h);font-size:1.5rem;color:var(--red);min-width:34px;text-align:right;transition:color .3s;}
.ch-question{font-size:.9rem;font-weight:500;margin-bottom:12px;line-height:1.5;}
.ch-options{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
.ch-opt{padding:10px 13px;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;font-size:.82rem;transition:all .15s;color:var(--text2);text-align:center;font-weight:500;}
.ch-opt:hover:not(.locked){border-color:var(--accent);background:var(--al);color:var(--accent);}
.ch-opt.correct{border-color:var(--green);background:var(--gl);color:var(--green);}
.ch-opt.wrong{border-color:var(--red);background:var(--rl);color:var(--red);}
.ch-opt.locked{pointer-events:none;}
.ch-lb{border-top:1px solid var(--border);padding-top:10px;display:none;}
.ch-lb-title{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:7px;}
.lb-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.8rem;}
.lb-av{width:20px;height:20px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.55rem;font-weight:700;}
.lb-pts{font-weight:700;color:var(--accent);margin-left:auto;}

/* INPUT */
.input-bar{background:var(--bg);border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;align-items:center;flex-shrink:0;}
.my-av{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.68rem;font-weight:700;}
.my-av img{width:100%;height:100%;object-fit:cover;}
.msg-input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:9px 14px;font-family:var(--b);font-size:.84rem;color:var(--text);outline:none;background:var(--bg2);transition:border-color .2s;}
.msg-input:focus{border-color:var(--accent);background:var(--bg);}
.msg-input::placeholder{color:var(--text3);}
.note-btn{width:34px;height:34px;border-radius:9px;background:var(--gl);border:1px solid var(--gm);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.note-btn:hover{background:var(--gm);}
.note-btn svg{width:13px;height:13px;color:var(--green);}
.send-btn{width:34px;height:34px;border-radius:9px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s;}
.send-btn:hover{background:#1448c0;}
.send-btn:disabled{opacity:.5;pointer-events:none;}
.send-btn svg{width:13px;height:13px;}

/* DROITE */
.right{background:var(--bg);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.rtabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.rtab{flex:1;padding:10px 4px;text-align:center;font-size:.72rem;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.rtab:hover{color:var(--text);}
.rtab.active{color:var(--accent);border-bottom-color:var(--accent);}
.rpanel{flex:1;overflow-y:auto;display:none;flex-direction:column;}
.rpanel.active{display:flex;}

/* PROGRAMME */
.sched-item{display:flex;gap:9px;align-items:flex-start;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer;}
.sched-item:hover{background:var(--bg2);}
.sched-item.current{background:var(--al);border-left:2px solid var(--accent);}
.si-time{font-size:.68rem;font-weight:700;color:var(--accent);width:40px;flex-shrink:0;margin-top:2px;}
.si-topic{font-size:.79rem;font-weight:500;margin-bottom:3px;}
.si-pill{font-size:.62rem;padding:2px 7px;border-radius:100px;font-weight:700;display:inline-block;}
.pill-lesson{background:var(--al);color:var(--accent);}
.pill-challenge{background:var(--pl);color:var(--purple);}
.pill-quiz{background:var(--gl);color:var(--green);}
.pill-break{background:var(--bg2);color:var(--text3);border:1px solid var(--border);}

/* PARTICIPANTS LISTE */
.parts-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.parts-header span{font-size:.78rem;font-weight:600;}
.online-badge{font-size:.7rem;color:var(--green);font-weight:500;}
.part-item{display:flex;align-items:center;gap:9px;padding:9px 14px;border-bottom:1px solid var(--border);transition:background .15s;}
.part-item:hover{background:var(--bg2);}
.part-av{width:30px;height:30px;border-radius:50%;overflow:hidden;position:relative;flex-shrink:0;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.7rem;font-weight:700;}
.part-av img{width:100%;height:100%;object-fit:cover;}
.part-dot{position:absolute;bottom:0;right:0;width:8px;height:8px;border-radius:50%;background:var(--green);border:1.5px solid var(--bg);}
.part-name{font-size:.81rem;font-weight:500;flex:1;}
.part-pts{font-size:.7rem;font-weight:700;color:var(--accent);}

/* CHAT */
.chat-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
.chat-msg{display:flex;gap:7px;align-items:flex-start;}
.chat-msg.mine{flex-direction:row-reverse;}
.cm-av{width:24px;height:24px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.6rem;font-weight:700;}
.cm-av img{width:100%;height:100%;object-fit:cover;}
.cm-body{max-width:80%;}
.cm-name{font-size:.65rem;color:var(--text3);margin-bottom:2px;}
.cm-bubble{background:var(--bg2);border-radius:4px 10px 10px 10px;padding:7px 11px;font-size:.79rem;color:var(--text2);}
.chat-msg.mine .cm-bubble{background:var(--al);border-radius:10px 4px 10px 10px;color:var(--accent);}
.chat-inp-row{padding:10px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0;}
.chat-inp{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-family:var(--b);font-size:.8rem;outline:none;background:var(--bg2);}
.chat-inp:focus{border-color:var(--accent);}
.chat-send{width:32px;height:32px;border-radius:8px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chat-send svg{width:12px;height:12px;}

/* NOTES */
.notes-list{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px;}
.note-inp-row{padding:10px;border-top:1px solid var(--border);flex-shrink:0;}
.note-textarea{width:100%;border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-family:var(--b);font-size:.8rem;outline:none;background:var(--bg2);resize:none;min-height:54px;line-height:1.5;}
.note-textarea:focus{border-color:var(--green);}
.note-pub-btn{width:100%;margin-top:7px;padding:9px;background:var(--green);color:#fff;border:none;border-radius:9px;font-family:var(--b);font-size:.8rem;font-weight:600;cursor:pointer;transition:background .2s;}
.note-pub-btn:hover{background:#036644;}

/* MODAL REJOINDRE */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
.modal-ov.show{display:flex;}
.modal{background:var(--bg);border-radius:20px;padding:34px;width:400px;max-width:94vw;animation:mIn .25s ease;}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal h2{font-family:var(--h);font-size:1.3rem;margin-bottom:5px;}
.modal-sub{font-size:.82rem;color:var(--text3);margin-bottom:18px;}
.mform{display:flex;flex-direction:column;gap:11px;}
.photo-zone{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px;background:var(--bg2);border-radius:11px;border:1.5px dashed var(--border);cursor:pointer;}
.photo-zone:hover{border-color:var(--accent);}
.photo-preview{width:68px;height:68px;border-radius:50%;overflow:hidden;background:var(--border);display:flex;align-items:center;justify-content:center;}
.photo-preview img{width:100%;height:100%;object-fit:cover;}
.photo-preview svg{width:26px;height:26px;color:var(--text3);}
.photo-hint{font-size:.74rem;color:var(--text3);text-align:center;}
.minp{border:1.5px solid var(--border);border-radius:9px;padding:12px 14px;font-family:var(--b);font-size:.86rem;color:var(--text);background:var(--bg2);outline:none;width:100%;transition:border-color .2s;}
.minp:focus{border-color:var(--accent);}
.mbtn{padding:13px;background:var(--text);color:#fff;border:none;border-radius:9px;font-family:var(--b);font-size:.9rem;font-weight:700;cursor:pointer;width:100%;transition:background .2s;}
.mbtn:hover{background:#1a1a2e;}
.merr{font-size:.79rem;color:var(--red);background:var(--rl);padding:8px 12px;border-radius:8px;display:none;}
.merr.show{display:block;}

@media(max-width:820px){.layout{grid-template-columns:1fr;}.right{display:none;}}
</style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <a href="index.html" class="logo"><div class="lm"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2L15 9H22L16.5 13.5L19 21L12 16.5L5 21L7.5 13.5L2 9H9L12 2Z" fill="white"/></svg></div><span class="ln">Learnova</span></a>
  <div class="live-pill"><span class="pulse"></span> EN DIRECT</div>
  <div class="sname" id="sessionName">Chargement...</div>
  <div class="ltimer" id="liveTimer">00:00:00</div>
  <div class="pcount-badge">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/></svg>
    <span id="partsCount">0</span>
  </div>
  <a href="index.html" class="btn btn-ghost" style="margin-left:auto;">Quitter</a>
</div>

<div class="layout">
  <!-- GAUCHE -->
  <div class="left">
    <div class="pbar" id="partsBar"><span class="pbar-label">Participants :</span></div>
    <div class="teach" id="teachArea"></div>

    <!-- CHALLENGE -->
    <div class="challenge-box" id="challengeBox">
      <div class="ch-head">
        <div class="ch-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
        <div class="ch-title" id="chTitle">Challenge !</div>
        <div class="ch-timer" id="chTimer">30</div>
      </div>
      <div class="ch-question" id="chQuestion"></div>
      <div class="ch-options" id="chOptions"></div>
      <div class="ch-lb" id="chLeaderboard">
        <div class="ch-lb-title">🏆 Classement</div>
        <div id="lbRows"></div>
      </div>
    </div>

    <!-- INPUT -->
    <div class="input-bar">
      <div class="my-av" id="myAvatar">?</div>
      <input class="msg-input" id="msgInput" type="text" placeholder="Pose une question à l'IA ou écris un message..." maxlength="500"/>
      <button class="note-btn" title="Publier une note" onclick="publishNote()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Envoyer">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <!-- DROITE -->
  <div class="right">
    <div class="rtabs">
      <div class="rtab active" onclick="switchRTab(this,'rprog')">Programme</div>
      <div class="rtab" onclick="switchRTab(this,'rparts')">Participants</div>
      <div class="rtab" onclick="switchRTab(this,'rchat')">Chat</div>
      <div class="rtab" onclick="switchRTab(this,'rnotes')">Notes</div>
    </div>

    <div id="rprog" class="rpanel active"><div id="schedList"></div></div>

    <div id="rparts" class="rpanel">
      <div class="parts-header"><span id="partsTitle">0 participant</span><span class="online-badge" id="onlineCount">● 0 en ligne</span></div>
      <div id="partsList"></div>
    </div>

    <div id="rchat" class="rpanel">
      <div class="chat-msgs" id="chatMessages"></div>
      <div class="chat-inp-row">
        <input class="chat-inp" id="chatInput" type="text" placeholder="Message..."/>
        <button class="chat-send" onclick="sendChat()"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>
    </div>

    <div id="rnotes" class="rpanel">
      <div class="notes-list" id="notesList"></div>
      <div class="note-inp-row">
        <textarea class="note-textarea" id="noteTextarea" placeholder="Écris une note visible par tous..." rows="3"></textarea>
        <button class="note-pub-btn" onclick="publishNote()">📝 Publier la note</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL REJOINDRE -->
<div class="modal-ov show" id="joinModal">
  <div class="modal">
    <h2>Rejoindre la session</h2>
    <div class="modal-sub">Entre ton prénom et ajoute ta photo pour apparaître parmi les participants.</div>
    <div class="mform">
      <div class="photo-zone" onclick="document.getElementById('photoInput').click()">
        <div class="photo-preview" id="photoPreview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="photo-hint">Clique pour ajouter ta photo (optionnel)</div>
        <input type="file" id="photoInput" accept="image/*" style="display:none;" onchange="previewPhoto(this)"/>
      </div>
      <input class="minp" id="joinPrenom" type="text" placeholder="Ton prénom *" maxlength="50"/>
      <div class="merr" id="joinError"></div>
      <button class="mbtn" onclick="joinSession()">Rejoindre la session →</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const SB_URL  = "https://jbshkbqchrehfhoodtuj.supabase.co"
const SB_KEY  = "sb_publishable_iBypuqRKhVqZUvNBmATW-w_I1LJHLRs"
const BACKEND = "https://learnova-backend-28pl.onrender.com"
const sb      = createClient(SB_URL, SB_KEY, { auth: { persistSession: true } })

// ── ÉTAT GLOBAL ───────────────────────────────────────────────
let me = {
  prenom: '',
  photo: null,
  uid: 'guest_' + Math.random().toString(36).substr(2, 8),
  score: 0
}
let sessionId   = new URLSearchParams(window.location.search).get('session')
let sessionData = null
let presenceCh  = null
let timerSecs   = 0
let isTyping    = false

// ── PHOTO PREVIEW ─────────────────────────────────────────────
window.previewPhoto = (input) => {
  const file = input.files[0]
  if (!file) return
  if (file.size > 2 * 1024 * 1024) { showToast('Photo trop grande (max 2MB)', 'err'); return }
  const reader = new FileReader()
  reader.onload = (e) => {
    me.photo = e.target.result
    document.getElementById('photoPreview').innerHTML = `<img src="${me.photo}" alt=""/>`
  }
  reader.readAsDataURL(file)
}

// ── REJOINDRE ─────────────────────────────────────────────────
window.joinSession = () => {
  const prenom = document.getElementById('joinPrenom').value.trim()
  const errEl  = document.getElementById('joinError')
  errEl.classList.remove('show')

  if (!prenom || prenom.length < 2) {
    errEl.textContent = 'Entre ton prénom (minimum 2 caractères).'
    errEl.classList.add('show')
    return
  }

  me.prenom = prenom
  document.getElementById('joinModal').classList.remove('show')

  // Mettre à jour mon avatar
  const myAv = document.getElementById('myAvatar')
  if (me.photo) {
    myAv.innerHTML = `<img src="${me.photo}" alt=""/>`
    myAv.style.padding = '0'
  } else {
    myAv.textContent = prenom.charAt(0).toUpperCase()
  }

  initLive()
}

// ── INIT LIVE ─────────────────────────────────────────────────
async function initLive() {
  // Timer
  setInterval(() => {
    timerSecs++
    const h = String(Math.floor(timerSecs / 3600)).padStart(2, '0')
    const m = String(Math.floor((timerSecs % 3600) / 60)).padStart(2, '0')
    const s = String(timerSecs % 60).padStart(2, '0')
    document.getElementById('liveTimer').textContent = `${h}:${m}:${s}`
  }, 1000)

  // Charger session depuis Supabase
  if (sessionId) {
    const { data: s } = await sb.from('sessions').select('*').eq('id', sessionId).single()
    if (s) {
      sessionData = s
      document.getElementById('sessionName').textContent = s.titre
      renderPlan(s.plan || [])

      // Écouter les messages chat
      sb.channel(`live-chat-${sessionId}`)
        .on('postgres_changes', {
          event: 'INSERT', schema: 'public', table: 'messages',
          filter: `session_id=eq.${sessionId}`
        }, (payload) => {
          if (payload.new.auteur_id !== me.uid) {
            addChatMessage(payload.new, false)
          }
        })
        .subscribe()

      loadChatHistory()
    }
  } else {
    document.getElementById('sessionName').textContent = 'Session de démonstration'
    renderDemoPlan()
  }

  // Présence Supabase Realtime
  presenceCh = sb.channel(`live-presence-${sessionId || 'demo'}`, {
    config: { presence: { key: me.uid } }
  })
  presenceCh
    .on('presence', { event: 'sync' }, () => {
      const users = Object.values(presenceCh.presenceState()).flat()
      updateParticipants(users)
    })
    .subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        await presenceCh.track({
          uid: me.uid,
          prenom: me.prenom,
          photo: me.photo,
          score: me.score
        })
      }
    })

  // L'IA commence à enseigner
  setTimeout(() => startTeaching(), 1500)
}

// ── PARTICIPANTS ───────────────────────────────────────────────
function updateParticipants(users) {
  const count = users.length
  document.getElementById('partsCount').textContent = count
  document.getElementById('partsTitle').textContent = `${count} participant${count > 1 ? 's' : ''}`
  document.getElementById('onlineCount').textContent = `● ${count} en ligne`

  // Barre des chips
  const bar = document.getElementById('partsBar')
  bar.innerHTML = '<span class="pbar-label">Participants :</span>'
  const maxShow = 15
  users.slice(0, maxShow).forEach(u => {
    const chip = document.createElement('div')
    chip.className = 'pchip'
    chip.title = u.prenom
    const avHtml = u.photo
      ? `<div class="pchip-av"><img src="${u.photo}" alt="${u.prenom}"/></div>`
      : `<div class="pchip-av">${u.prenom.charAt(0).toUpperCase()}</div>`
    chip.innerHTML = `${avHtml}<span class="pchip-name">${u.prenom}</span>`
    bar.appendChild(chip)
  })
  if (users.length > maxShow) {
    bar.innerHTML += `<span class="pmore">+${users.length - maxShow} autres</span>`
  }

  // Liste participants
  document.getElementById('partsList').innerHTML = users.map(u => `
    <div class="part-item">
      <div class="part-av">
        ${u.photo ? `<img src="${u.photo}" alt="${u.prenom}"/>` : u.prenom.charAt(0).toUpperCase()}
        <div class="part-dot"></div>
      </div>
      <span class="part-name">${u.prenom}${u.uid === me.uid ? ' <span style="color:var(--text3);font-size:.7rem;">(moi)</span>' : ''}</span>
      <span class="part-pts">${u.score || 0} pts</span>
    </div>`).join('')
}

// ── PLAN ──────────────────────────────────────────────────────
function renderPlan(plan) {
  const tmap = { lesson: 'pill-lesson', challenge: 'pill-challenge', quiz: 'pill-quiz', break: 'pill-break' }
  const lmap = { lesson: 'Leçon', challenge: 'Challenge', quiz: 'Quiz', break: 'Pause' }
  document.getElementById('schedList').innerHTML = plan.length
    ? plan.map((p, i) => `
        <div class="sched-item ${i === 0 ? 'current' : ''}">
          <div class="si-time">${p.time || p.t || '—'}</div>
          <div>
            <div class="si-topic">${p.topic}</div>
            <span class="si-pill ${tmap[p.type] || 'pill-lesson'}">${lmap[p.type] || 'Leçon'}</span>
          </div>
        </div>`).join('')
    : '<div style="padding:14px;font-size:.78rem;color:var(--text3);">Programme en cours...</div>'
}

function renderDemoPlan() {
  renderPlan([
    { t: '00:00', topic: 'Introduction', type: 'lesson', time: '00:00' },
    { t: '00:20', topic: 'Concepts clés', type: 'lesson', time: '00:20' },
    { t: '00:45', topic: 'Challenge collectif', type: 'challenge', time: '00:45' },
    { t: '01:00', topic: 'Pause', type: 'break', time: '01:00' },
    { t: '01:10', topic: 'Approfondissement', type: 'lesson', time: '01:10' },
    { t: '01:50', topic: 'Quiz final', type: 'quiz', time: '01:50' }
  ])
}

// ── ENSEIGNER (IA) ────────────────────────────────────────────
async function startTeaching() {
  const topic = sessionData?.titre || 'cette session Learnova'
  addAIMessage(`Bonjour à tous ! 🎉 Je suis votre professeur IA pour **"${topic}"**. Je suis là pour vous, posez-moi vos questions à tout moment — je réponds à chacun de vous !`, 'Ouverture')

  try {
    const res = await fetch(`${BACKEND}/api/teach`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        topic,
        type: 'lesson',
        level: sessionData?.difficulte || 'Tous niveaux'
      })
    })
    if (!res.ok) throw new Error('Backend non disponible')
    const data = await res.json()
    if (data.content) {
      setTimeout(() => addAIMessage(data.content, 'Cours'), 2500)
      setTimeout(() => launchChallenge(), 25000)
    }
  } catch (e) {
    setTimeout(() => addAIMessage(
      `Aujourd'hui nous explorons **${topic}** ensemble. Ce sujet est essentiel pour votre progression. N'hésitez pas à me poser vos questions — je suis là pour vous aider !`,
      'Cours'
    ), 2500)
    setTimeout(() => launchChallenge(), 18000)
  }
}

// ── AJOUTER MESSAGE IA ─────────────────────────────────────────
function addAIMessage(text, label = 'IA') {
  const area = document.getElementById('teachArea')
  const formatted = text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br/>')
  const div = document.createElement('div')
  div.className = 'ai-msg'
  div.innerHTML = `
    <div class="ai-av">AI</div>
    <div class="ai-body">
      <div class="ai-label">Learnova IA <span>${label}</span></div>
      <div class="ai-bubble">${formatted}</div>
    </div>`
  area.appendChild(div)
  area.scrollTop = area.scrollHeight
}

function showTypingIndicator() {
  if (isTyping) return null
  isTyping = true
  const area = document.getElementById('teachArea')
  const div = document.createElement('div')
  div.className = 'typing-msg'
  div.id = 'typingIndicator'
  div.innerHTML = `
    <div class="ai-av">AI</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>`
  area.appendChild(div)
  area.scrollTop = area.scrollHeight
  return div
}

function removeTyping() {
  isTyping = false
  document.getElementById('typingIndicator')?.remove()
}

// ── ENVOYER MESSAGE / QUESTION À L'IA ─────────────────────────
window.sendMessage = async () => {
  const input  = document.getElementById('msgInput')
  const text   = input.value.trim()
  const sendBtn = document.getElementById('sendBtn')
  if (!text) return
  if (!me.prenom) { showToast('Rejoins d\'abord la session !', 'err'); return }

  input.value = ''
  sendBtn.disabled = true

  const area = document.getElementById('teachArea')

  // Afficher le message de l'utilisateur
  const userDiv = document.createElement('div')
  userDiv.className = 'user-msg'
  const avHtml = me.photo
    ? `<div class="user-av"><img src="${me.photo}" alt=""/></div>`
    : `<div class="user-av">${me.prenom.charAt(0).toUpperCase()}</div>`
  userDiv.innerHTML = `${avHtml}<div class="user-bubble">${text}</div>`
  area.appendChild(userDiv)
  area.scrollTop = area.scrollHeight

  // Sauvegarder dans le chat Supabase
  if (sessionId) {
    await sb.from('messages').insert({
      session_id: sessionId,
      auteur_id: me.uid,
      auteur_nom: me.prenom,
      texte: text
    }).catch(() => {})
  }

  // Indicateur de frappe
  const typingDiv = showTypingIndicator()

  try {
    const res = await fetch(`${BACKEND}/api/ask-ai`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: text,
        course_title: sessionData?.titre || 'cette session',
        course_context: sessionData?.description || ''
      })
    })

    removeTyping()

    if (!res.ok) throw new Error('Backend indisponible')
    const data = await res.json()

    if (data.answer) {
      addAIMessage(data.answer, `Répond à ${me.prenom}`)
    } else {
      addAIMessage('Excellente question ! Explorons ce point ensemble.', 'Réponse')
    }
  } catch (e) {
    removeTyping()
    const fallbacks = [
      'Très bonne question ! Ce concept est au cœur du sujet. Regardons ça ensemble.',
      'Bonne réflexion ! Essaie d\'appliquer ça avec un exemple concret.',
      'C\'est exactement la bonne direction ! On va y revenir dans la suite du cours.',
      'Excellente observation ! Ça montre que tu suis bien le cours.'
    ]
    addAIMessage(fallbacks[Math.floor(Math.random() * fallbacks.length)], 'Réponse')
  } finally {
    sendBtn.disabled = false
    input.focus()
  }
}

// Touche Entrée pour envoyer
document.getElementById('msgInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault()
    sendMessage()
  }
})

// ── CHAT EN TEMPS RÉEL ─────────────────────────────────────────
async function loadChatHistory() {
  if (!sessionId) return
  const { data: msgs } = await sb.from('messages')
    .select('*')
    .eq('session_id', sessionId)
    .order('created_at', { ascending: true })
    .limit(50)
  msgs?.forEach(m => addChatMessage(m, m.auteur_id === me.uid))
}

function addChatMessage(msg, isMe) {
  const container = document.getElementById('chatMessages')
  const div = document.createElement('div')
  div.className = `chat-msg${isMe ? ' mine' : ''}`
  const initial = msg.auteur_nom?.charAt(0)?.toUpperCase() || '?'
  div.innerHTML = `
    <div class="cm-av">${initial}</div>
    <div class="cm-body">
      ${!isMe ? `<div class="cm-name">${msg.auteur_nom || '?'}</div>` : ''}
      <div class="cm-bubble">${msg.texte}</div>
    </div>`
  container.appendChild(div)
  container.scrollTop = container.scrollHeight
}

window.sendChat = async () => {
  const input = document.getElementById('chatInput')
  const text  = input.value.trim()
  if (!text) return
  if (!me.prenom) { showToast('Rejoins d\'abord la session !', 'err'); return }
  input.value = ''

  addChatMessage({ auteur_id: me.uid, auteur_nom: me.prenom, texte: text }, true)

  if (sessionId) {
    await sb.from('messages').insert({
      session_id: sessionId,
      auteur_id: me.uid,
      auteur_nom: me.prenom,
      texte: text
    }).catch(() => {})
  }
}

document.getElementById('chatInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') sendChat()
})

// ── NOTES PUBLIQUES ────────────────────────────────────────────
window.publishNote = () => {
  const textarea = document.getElementById('noteTextarea')
  const input    = document.getElementById('msgInput')
  const text     = textarea.value.trim() || input.value.trim()
  if (!text) return
  if (!me.prenom) { showToast('Rejoins d\'abord la session !', 'err'); return }

  textarea.value = ''
  input.value = ''

  const time = new Date().toLocaleTimeString('fr', { hour: '2-digit', minute: '2-digit' })

  // Dans la zone principale
  const area = document.getElementById('teachArea')
  const noteDiv = document.createElement('div')
  noteDiv.className = 'note-msg'
  noteDiv.innerHTML = `
    <div class="note-head">
      <div class="note-av">${me.photo ? `<img src="${me.photo}" alt=""/>` : me.prenom.charAt(0).toUpperCase()}</div>
      <span class="note-name">${me.prenom}</span>
      <span class="note-time">${time}</span>
    </div>
    <div class="note-text">📝 ${text}</div>`
  area.appendChild(noteDiv)
  area.scrollTop = area.scrollHeight

  // Dans le panel notes
  addNoteToPanel({ prenom: me.prenom, photo: me.photo, text, time })
  showToast('Note publiée ! 📝')
}

function addNoteToPanel(note) {
  const list = document.getElementById('notesList')
  const div = document.createElement('div')
  div.className = 'note-msg'
  div.innerHTML = `
    <div class="note-head">
      <div class="note-av">${note.photo ? `<img src="${note.photo}" alt=""/>` : note.prenom.charAt(0).toUpperCase()}</div>
      <span class="note-name">${note.prenom}</span>
      <span class="note-time">${note.time}</span>
    </div>
    <div class="note-text">${note.text}</div>`
  list.appendChild(div)
  list.scrollTop = list.scrollHeight
}

// ── CHALLENGE ──────────────────────────────────────────────────
async function launchChallenge() {
  let challengeData = null

  try {
    const res = await fetch(`${BACKEND}/api/teach`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        topic: sessionData?.titre || 'ce cours',
        type: 'challenge'
      })
    })
    if (res.ok) {
      const data = await res.json()
      if (data.question) challengeData = data
    }
  } catch (e) {}

  if (!challengeData) {
    challengeData = {
      titre: 'Challenge — Réponds vite !',
      question: 'Quelle est la meilleure façon d\'apprendre efficacement ?',
      options: ['Lire sans pratiquer', 'Pratiquer régulièrement', 'Mémoriser par cœur', 'Regarder sans participer'],
      correct: 1,
      explication: 'La pratique régulière est la clé de tout apprentissage efficace.'
    }
  }

  runChallenge(challengeData)
}

function runChallenge(ch) {
  const box = document.getElementById('challengeBox')
  box.classList.add('show')

  document.getElementById('chTitle').textContent = ch.titre || 'Challenge !'
  document.getElementById('chQuestion').textContent = ch.question
  document.getElementById('chLeaderboard').style.display = 'none'

  const opts = document.getElementById('chOptions')
  opts.innerHTML = (ch.options || ch.opts || []).map((opt, i) =>
    `<div class="ch-opt" data-idx="${i}" onclick="answerChallenge(this,${i},${ch.correct})">${opt}</div>`
  ).join('')

  addAIMessage(`⚡ **${ch.titre || 'Challenge !'}** — ${ch.question} Vous avez **30 secondes** !`, 'Challenge !')

  let t = 30
  document.getElementById('chTimer').textContent = t
  document.getElementById('chTimer').style.color = 'var(--red)'

  const interval = setInterval(() => {
    t--
    const timerEl = document.getElementById('chTimer')
    if (timerEl) timerEl.textContent = t
    if (t <= 5 && timerEl) timerEl.style.color = '#dc2626'
    if (t <= 0) {
      clearInterval(interval)
      revealChallenge(ch.correct, ch.explication)
    }
  }, 1000)

  box.dataset.interval = interval
  box.dataset.correct = ch.correct
  box.dataset.explication = ch.explication || ''
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' })
}

window.answerChallenge = (el, idx, correct) => {
  if (el.classList.contains('locked')) return
  clearInterval(parseInt(document.getElementById('challengeBox').dataset.interval))

  document.querySelectorAll('.ch-opt').forEach(o => o.classList.add('locked'))

  if (idx === correct) {
    el.classList.add('correct')
    me.score += 100
    presenceCh?.track({ uid: me.uid, prenom: me.prenom, photo: me.photo, score: me.score })
    showToast('🎉 +100 points ! Bonne réponse !', 'ok')
  } else {
    el.classList.add('wrong')
    showToast('Pas tout à fait… La bonne réponse s\'affiche !', 'err')
  }

  setTimeout(() => revealChallenge(correct, document.getElementById('challengeBox').dataset.explication), 500)
}

function revealChallenge(correct, explication) {
  document.querySelectorAll('.ch-opt').forEach((opt, i) => {
    opt.classList.add('locked')
    if (i === correct) opt.classList.add('correct')
  })

  const lb = document.getElementById('chLeaderboard')
  lb.style.display = 'block'
  document.getElementById('lbRows').innerHTML = `
    <div class="lb-row">
      <span style="font-size:.9rem;">🥇</span>
      <div class="lb-av">${me.photo ? `<img src="${me.photo}" alt=""/>` : me.prenom.charAt(0).toUpperCase()}</div>
      <span style="flex:1;font-weight:500;">${me.prenom}</span>
      <span class="lb-pts">${me.score} pts</span>
    </div>`

  if (explication) {
    addAIMessage(`✅ Bonne réponse : **${document.querySelectorAll('.ch-opt')[correct]?.textContent}**\n\n${explication}`, 'Résultat du challenge')
  }
}

// ── TABS DROITE ────────────────────────────────────────────────
window.switchRTab = (el, panelId) => {
  document.querySelectorAll('.rtab').forEach(t => t.classList.remove('active'))
  document.querySelectorAll('.rpanel').forEach(p => p.classList.remove('active'))
  el.classList.add('active')
  document.getElementById(panelId).classList.add('active')
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg, type = 'dark') {
  let t = document.getElementById('ln-toast')
  if (!t) {
    t = document.createElement('div')
    t.id = 'ln-toast'
    t.style.cssText = 'position:fixed;bottom:20px;right:20px;padding:11px 18px;border-radius:10px;font-size:.82rem;z-index:9999;transform:translateY(60px);transition:all .3s;font-family:"DM Sans",sans-serif;font-weight:500;'
    document.body.appendChild(t)
  }
  const colors = { dark: 'background:#09090f;color:#fff;', ok: 'background:#047857;color:#fff;', err: 'background:#b91c1c;color:#fff;' }
  t.style.cssText += colors[type] || colors.dark
  t.textContent = msg
  t.style.transform = 'translateY(0)'
  clearTimeout(t._t)
  t._t = setTimeout(() => t.style.transform = 'translateY(60px)', 3500)
}
</script>
